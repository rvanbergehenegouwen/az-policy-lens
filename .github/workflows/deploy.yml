name: Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AZURE_WEBAPP_NAME: 'az-policy-lens-app-dev'
  AZURE_RG: 'az-policy-lens-rg'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: cd backend && npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build backend
        run: cd backend && npm run build

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r backend/dist deploy/
          cp -r frontend/dist deploy/public
          cp web.config deploy/
          # Include backend package.json and node_modules for production
          cp backend/package.json deploy/
          cp backend/package-lock.json deploy/ || true
          # Install production-only dependencies
          cd deploy && npm ci --production && cd ..

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: deploy/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: deploy/

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          package: deploy/
